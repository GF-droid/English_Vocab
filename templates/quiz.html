{% extends "base.html" %}
{% block title %}🎯 选择测验模式 — 记单词{% endblock %}

{% block content %}
<h5 class="mb-3">🎯 选择测验模式</h5>

<div class="row g-2 mb-3">
    <div class="col-md-6">
        <form action="{{ url_for('quiz.quiz_mc') }}" method="get">
        <div class="card h-100">
            <div class="card-body text-center p-4">
                <div class="fs-2 mb-2">📝</div>
                <h6>选择题模式</h6>
                <p class="small text-muted">看英文选中文释义，4选1</p>
                <div class="row g-2 mb-3">
                    <div class="col-6">
                        <select name="book_id" class="form-select form-select-sm">
                            <option value="">全部单词</option>
                            {% for book in get_book_options() %}
                            <option value="{{ book.id }}">{{ book.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-6">
                        <select name="count" class="form-select form-select-sm">
                            <option value="10" selected>10 题</option><option value="20">20 题</option><option value="30">30 题</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100">开始选择题</button>
            </div>
        </div>
        </form>
    </div>
    <div class="col-md-6">
        <form action="{{ url_for('quiz.quiz_spell') }}" method="get">
        <div class="card h-100">
            <div class="card-body text-center p-4">
                <div class="fs-2 mb-2">✍️</div>
                <h6>拼写模式</h6>
                <p class="small text-muted">看释义默写英文单词</p>
                <div class="row g-2 mb-3">
                    <div class="col-6">
                        <select name="book_id" class="form-select form-select-sm">
                            <option value="">全部单词</option>
                            {% for book in get_book_options() %}
                            <option value="{{ book.id }}">{{ book.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-6">
                        <select name="count" class="form-select form-select-sm">
                            <option value="10" selected>10 题</option><option value="20">20 题</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn btn-success w-100">开始拼写</button>
            </div>
        </div>
        </form>
    </div>
</div>

<!-- Quick quiz + tips row -->
<div class="row g-2">
    <div class="col-lg-8">
        <div class="card"><div class="card-body d-flex justify-content-between align-items-center p-3">
            <div><h6 class="mb-1">🔁 错题重测</h6><p class="small text-muted mb-0">只测做错的单词，针对性巩固</p></div>
            <div class="d-flex gap-2">
                <a href="{{ url_for('quiz.quiz_mc', wrong_only=1) }}" class="btn btn-sm btn-outline-primary">选择题重测</a>
                <a href="{{ url_for('quiz.quiz_spell', wrong_only=1) }}" class="btn btn-sm btn-outline-success">拼写重测</a>
            </div>
        </div></div>
    </div>
    <div class="col-lg-4">
        <div class="card"><div class="card-body p-3">
            <small class="fw-semibold">💡 测验建议</small>
            <ul class="small text-muted mb-0 mt-1 ps-3">
                <li>每天学完后立即测验效果最好</li>
                <li>错题会自动收录，记得定期回顾</li>
                <li>选择对应单词书可做单元测验</li>
            </ul>
        </div></div>
    </div>
</div>
{% endblock %}
